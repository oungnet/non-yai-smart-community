<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>AI ผู้ช่วยชุมชน</title>
<style>
body { font-family: sans-serif; background:#f4f6f9; padding:30px; }
#chat { background:white; padding:20px; border-radius:10px; }
input, button { padding:10px; }
</style>
</head>
<body>

<h2>AI ผู้ช่วยบ้านโนนใหญ่</h2>

<div id="chat">
<div id="messages"></div>
<br>
<input type="text" id="question" placeholder="ถามเกี่ยวกับชุมชน..." style="width:70%">
<button onclick="askAI()">ถาม</button>
</div>

<script>
async function askAI(){
    const q = document.getElementById("question").value;
    const res = await fetch("YOUR_APPS_SCRIPT_URL?type=AI&q=" + encodeURIComponent(q));
    const data = await res.json();
    document.getElementById("messages").innerHTML += "<p><b>คุณ:</b> "+q+"</p>";
    document.getElementById("messages").innerHTML += "<p><b>AI:</b> "+data.answer+"</p>";
}
</script>

</body>
</html>
