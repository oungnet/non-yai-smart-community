<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เส้นเวลาประวัติบ้านโนนใหญ่</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: sans-serif;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #1e2b3c;
    color: white;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

.timeline {
    position: relative;
    margin: 40px 0;
    padding-left: 40px;
    border-left: 4px solid #2e8b57;
}

.event {
    margin-bottom: 40px;
    cursor: pointer;
    transition: 0.3s;
}

.event:hover {
    transform: translateX(5px);
}

.event.active h3 {
    color: #2e8b57;
}

.dot {
    position: absolute;
    left: -11px;
    width: 16px;
    height: 16px;
    background: #2e8b57;
    border-radius: 50%;
}

.chart-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-top: 50px;
}
</style>
</head>

<body>

<header>
<h2>เส้นเวลาประวัติบ้านโนนใหญ่</h2>
    <nav>
    <a href="index.html" class="active">หน้าแรก</a>
    <a href="community.html">ประวัติชุมชน</a>
    <a href="timeline.html">ประวัติชุมชน (Timeline)</a>  
    <a href="news.html">ข่าว</a>
    <a href="report.html">แจ้งเรื่อง</a>
    <a href="dashboard.html">Dashboard</a>
    </nav>
</header>

<div class="container">

<div id="timeline" class="timeline"></div>

<div class="chart-box">
<h3>สัดส่วนเหตุการณ์ตามหมวดหมู่</h3>
<canvas id="categoryChart"></canvas>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxB1oKGPaNItZiVMqo3coljp7bpm_Gq7VPe8-Jdzog6p9VbwMD3eaJI8a9VwIlVG4rs6g/exec?type=EVENTS";

fetch(API_URL)
.then(res => res.json())
.then(data => {

    // เรียงตามปี
    data.sort((a,b) => a.year_be - b.year_be);

    const timeline = document.getElementById("timeline");

    const categoryCount = {};

    data.forEach(event => {

        const div = document.createElement("div");
        div.className = "event";

        const dot = document.createElement("div");
        dot.className = "dot";

        const year = document.createElement("h3");
        year.textContent = "พ.ศ. " + event.year_be;

        const title = document.createElement("h4");
        title.textContent = event.title;

        const desc = document.createElement("p");
        desc.textContent = event.description;

        div.appendChild(dot);
        div.appendChild(year);
        div.appendChild(title);
        div.appendChild(desc);

        div.addEventListener("click", () => {
            document.querySelectorAll(".event").forEach(e => e.classList.remove("active"));
            div.classList.add("active");
        });

        timeline.appendChild(div);

        // นับหมวดหมู่
        if(!categoryCount[event.category]){
            categoryCount[event.category] = 0;
        }
        categoryCount[event.category]++;
    });

    createChart(categoryCount);
});

function createChart(categoryData){
    const ctx = document.getElementById('categoryChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(categoryData),
            datasets: [{
                label: 'จำนวนเหตุการณ์',
                data: Object.values(categoryData)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            }
        }
    });
}
</script>

</body>
</html>
