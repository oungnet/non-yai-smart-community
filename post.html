<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข่าวประชาสัมพันธ์</title>
<style>
body { font-family: sans-serif; background:#f4f6f9; margin:0; }
.container { max-width:900px; margin:40px auto; padding:20px; }
.card {
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}
h2 { margin-top:0; }
.meta { font-size:14px; color:gray; }
</style>
</head>
<body>

<div class="container">
<h1>ข่าวประชาสัมพันธ์</h1>
<div id="posts"></div>
</div>

<script>
const API_URL = "YOUR_APPS_SCRIPT_URL?type=POSTS";

fetch(API_URL)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("posts");

    // แสดงเฉพาะ published
    const posts = data
        .filter(p => p.status === "published")
        .sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

    posts.forEach(post => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h2>${post.title}</h2>
            <div class="meta">
                โดย ${post.author} | ${post.created_at}
            </div>
            <p>${post.content}</p>
        `;

        container.appendChild(div);
    });

});
</script>

</body>
</html>
