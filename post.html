<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข่าวประชาสัมพันธ์</title>
<style>
body { font-family:sans-serif; background:#f4f6f9; margin:0; }
.container { max-width:1000px; margin:40px auto; padding:20px; }
.card {
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  transition:0.2s;
}
.card:hover { transform:translateY(-3px); }
.meta { font-size:13px; color:gray; margin-bottom:10px; }
a { text-decoration:none; color:inherit; }
.filter { margin-bottom:20px; }
</style>
</head>
<body>

<div class="container">

<h1>ข่าวประชาสัมพันธ์</h1>

<select id="categoryFilter" class="filter">
  <option value="">ทั้งหมด</option>
</select>

<div id="posts"></div>

</div>

<script>
const API_URL = "YOUR_APPS_SCRIPT_URL?type=POSTS";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("posts");
  const filter = document.getElementById("categoryFilter");

  const posts = data
    .filter(p => p.status === "published")
    .sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  const categories = [...new Set(posts.map(p => p.category))];
  categories.forEach(cat=>{
    const opt=document.createElement("option");
    opt.value=cat;
    opt.textContent=cat;
    filter.appendChild(opt);
  });

  function render(selectedCategory=""){

    container.innerHTML="";

    posts
      .filter(p => !selectedCategory || p.category===selectedCategory)
      .forEach(post=>{

        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
          <a href="post-detail.html?id=${post.id}">
            <h2>${post.title}</h2>
            <div class="meta">
              ${post.category} | ${post.created_at} | โดย ${post.author}
            </div>
            <p>${post.excerpt || ""}</p>
          </a>
        `;

        container.appendChild(div);
      });
  }

  filter.addEventListener("change",()=>{
    render(filter.value);
  });

  render();

});
</script>

</body>
</html>
